name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      # Headless: no terminal is needed. The capture-invariant tests replay the
      # committed captures/*.toml fixtures; the rest are pure logic.
      - name: Test
        run: cargo test --workspace

  semver-checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    # Gates every PR against the last released API on crates.io. The first
    # baseline is 0.1.0 (published 2026-05-28); for emergency manual runs the
    # job still fires on `workflow_dispatch`.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: Check semver
        run: cargo semver-checks check-release --workspace
